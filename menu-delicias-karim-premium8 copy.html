<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delicias Karim - Menú Digital</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: clamp(8px, 2vh, 24px);
            background: #ffe6f0;
            position: relative;
        }

        .bg-icons {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-icons span {
            position: absolute;
            user-select: none;
            filter: grayscale(12%) saturate(0.92);
        }

        /* Contenedor principal */
        .menu-container {
            position: relative;
            z-index: 1;
            width: min(1350px, 96vw);
            background: linear-gradient(180deg, #fffefe 0%, #fff8fb 100%);
            border-radius: 50px;
            padding: clamp(14px, 2.2vh, 30px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.25);
            border: 12px solid #ff6fa3;
            text-align: center;
            box-sizing: border-box;
            overflow: hidden;
        }

        .menu-container::before {
            content: "";
            position: absolute;
            inset: 14px;
            border-radius: 34px;
            border: 1px solid rgba(255, 150, 190, 0.35);
            pointer-events: none;
        }

        .menu-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(180deg, rgba(255, 111, 163, 0.12) 0%, rgba(255, 111, 163, 0) 100%);
            pointer-events: none;
        }

        /* Logo */
        .logo {
            display: flex;
            justify-content: center;
            line-height: 0;
            margin-bottom: 2px;
            isolation: isolate;
        }

        .logo img {
            width: clamp(300px, 30vh, 520px);
            display: block;
            margin-top: clamp(-145px, -15vh, -95px);
            margin-bottom: clamp(-160px, -16vh, -100px);
            mix-blend-mode: multiply;
            filter: saturate(1.05) contrast(1.04) drop-shadow(0 8px 14px rgba(177, 72, 120, 0.14));
        }

        .peru-mark {
            display: flex;
            justify-content: center;
            margin-top: -18px;
            margin-bottom: 4px;
        }

        .peru-flag {
            width: clamp(38px, 5.1vh, 56px);
            aspect-ratio: 3 / 2;
            border-radius: 6px;
            border: 1px solid rgba(176, 90, 133, 0.45);
            box-shadow: 0 6px 14px rgba(176, 90, 133, 0.24);
            background: linear-gradient(90deg, #d91023 0 33.33%, #ffffff 33.33% 66.66%, #d91023 66.66% 100%);
        }

        /* Título desayuno */
        .title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(28px, 4.4vh, 50px);
            color: #d63384;
            margin-bottom: 6px;
            letter-spacing: 1px;
            text-shadow: 0 4px 14px rgba(214, 51, 132, 0.16);
        }

        .subtitle {
            font-size: clamp(12px, 1.5vh, 16px);
            font-weight: 500;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: #b05a85;
            margin-bottom: 12px;
        }

        /* Productos */
        #productList {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px 20px;
            margin-bottom: 20px;
            width: 100%;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(24px) scale(0.98);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .product {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            font-size: clamp(14px, 2vh, 18px);
            gap: 0;
            padding: 0;
            border: none;
            border-radius: 24px;
            background: #ffffff;
            box-shadow: 0 8px 24px rgba(214, 51, 132, 0.08);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            height: 100%;
            overflow: hidden;
            box-sizing: border-box;
            opacity: 0;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .product-img {
            width: 100%;
            aspect-ratio: 5 / 4;
            border-radius: 0;
            object-fit: cover;
            border: none;
            box-shadow: none;
            margin-bottom: 14px;
        }

        .product-name {
            font-size: clamp(15px, 2vh, 19px);
            font-weight: 700;
            letter-spacing: 0.2px;
            color: #2d2d2d;
            line-height: 1.3;
            padding: 0 16px;
            margin-bottom: 12px;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        @media (max-width: 640px) {
            .menu-container {
                border-width: 8px;
                border-radius: 28px;
            }

            .title {
                margin-bottom: 22px;
            }
        }

        @media (max-height: 900px) {
            .menu-container {
                padding: 12px 18px;
                border-width: 10px;
            }

            .logo img {
                width: clamp(280px, 40vh, 400px);
                margin-top: clamp(-100px, -11vh, -70px);
                margin-bottom: clamp(-112px, -12vh, -74px);
            }

            .title {
                font-size: clamp(24px, 4vh, 38px);
                margin-bottom: 10px;
            }

            .product {
                font-size: clamp(12px, 1.8vh, 16px);
                padding: 10px;
                border-radius: 18px;
            }

            .footer {
                margin-top: 10px;
                font-size: 12px;
            }
        }

        .product:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 36px rgba(214, 51, 132, 0.18);
        }

        .product:hover .product-name {
            color: #d63384;
        }

        .price {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #ffffff;
            background: linear-gradient(135deg, #ff6fa3 0%, #ff3d8d 100%);
            padding: 5px 20px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
            font-size: clamp(14px, 1.8vh, 17px);
            box-shadow: 0 4px 14px rgba(255, 61, 141, 0.28);
            margin-bottom: 20px;
            margin-top: auto;
        }

        /* Panel admin */
        .admin-panel {
            margin-top: 35px;
            display: none;
        }

        input {
            padding: 10px;
            margin: 5px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            padding: 10px 15px;
            border: none;
            border-radius: 12px;
            background: #ff3d8d;
            color: white;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #e60073;
        }

        .footer {
            margin-top: 25px;
            font-size: 14px;
            color: #999;
        }
    </style>
</head>

<body>

    <div class="bg-icons" id="bgIcons"></div>

    <div class="menu-container">

        <div class="logo">
            <img src="logo.png" alt="Delicias Karim">
        </div>

        <div class="peru-mark"><span class="peru-flag" aria-label="Bandera del Perú" title="Bandera del Perú"></span>
        </div>

        <div class="title">Desayunos Peruanos</div>
        <div class="subtitle">Sabor casero • Recién servido</div>

        <div id="productList"></div>

        <div class="admin-panel" id="adminPanel">
            <h3>Panel Administrador</h3>
            <input type="text" id="name" placeholder="Producto">
            <input type="number" id="price" placeholder="Precio €">
            <button onclick="addProduct()">Añadir</button>
        </div>

        <div class="footer">
            José Miguel Castro Huayllas
        </div>

    </div>

    <script>
        const defaultProducts = [
            { name: "Pan con Chicharrón", price: 8.00, img: "pan_chicharron.PNG" },
            { name: "Pan con Tamal", price: 8.00, img: "https://images.unsplash.com/photo-1509722747041-616f39b57569?w=400&h=300&fit=crop" },
            { name: "Pan con Pollo", price: 5.00, img: "pan_pollo.PNG" },
            { name: "Empanada de Pollo", price: 4.00, img: "empanada_pollo.PNG" },
            { name: "Pollo Broaster", price: 14.00, img: "pollo_broster.PNG" },
            { name: "Combinado", price: 5.00, img: "combinado.PNG" },
            { name: "Torta Helada", price: 4.00, img: "tarta_helada.PNG" },
            { name: "Pan con Asado", price: 7.00, img: "https://images.unsplash.com/photo-1627308595229-7830f5c9c66e?w=400&h=300&fit=crop" },
            { name: "Pan con Salchicha", price: 6.00, img: "https://images.unsplash.com/photo-1528732821692-e776ff0606af?w=400&h=300&fit=crop" },
            { name: "Pan con Jamón", price: 5.00, img: "https://images.unsplash.com/photo-1553909489-cd47ce7f0989?w=400&h=300&fit=crop" },
            { name: "Sangrecita", price: 4.00, img: "https://images.unsplash.com/photo-1544025162-811c7dfec09f?w=400&h=300&fit=crop" },
            { name: "Caldo de Gallina", price: 10.00, img: "https://images.unsplash.com/photo-1547592166-23ac45744acd?w=400&h=300&fit=crop" },
            { name: "Caldo de Mote", price: 10.00, img: "https://images.unsplash.com/photo-1548946522-4a313e8972a4?w=400&h=300&fit=crop" },
            { name: "Lomo al Jugo", price: 6.00, img: "https://images.unsplash.com/photo-1529042410759-befb1204b468?w=400&h=300&fit=crop" },
            { name: "Pan con Huevo", price: 5.00, img: "https://images.unsplash.com/photo-1482049016688-2d3e1b311543?w=400&h=300&fit=crop" },
            { name: "Tamal Criollo", price: 7.00, img: "https://images.unsplash.com/photo-1558222218-b7b54eede3f3?w=400&h=300&fit=crop" },
            { name: "Pan con Palta", price: 5.00, img: "https://images.unsplash.com/photo-1525351484163-7529414344d8?w=400&h=300&fit=crop" },
            { name: "Quinua Caliente", price: 4.00, img: "https://images.unsplash.com/photo-1494390248081-4e521a5940db?w=400&h=300&fit=crop" },
            { name: "Emoliente", price: 2.50, img: "https://images.unsplash.com/photo-1556679343-c7306c1976bc?w=400&h=300&fit=crop" },
            { name: "Café Pasado", price: 3.00, img: "https://images.unsplash.com/photo-1497935586351-b67a49e012bf?w=400&h=300&fit=crop" }
        ];

        if (!localStorage.getItem("menu_version_8")) {
            localStorage.removeItem("products");
            localStorage.setItem("menu_version_8", "true");
        }

        const storedProducts = JSON.parse(localStorage.getItem("products")) || [];

        let products = defaultProducts.map((item) => ({ ...item }));

        function normalizeProductName(name) {
            return String(name || "")
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "")
                .replace(/^[^\p{L}\p{N}]+/gu, "")
                .replace(/\s+/g, " ")
                .trim()
                .toLowerCase();
        }

        function canonicalProductName(name) {
            const rawName = String(name || "").trim();
            const normalized = normalizeProductName(rawName);
            const aliases = {
                "combinado especial": "combinado",
                "pan con jamon del pais": null
            };
            if (Object.prototype.hasOwnProperty.call(aliases, normalized) && aliases[normalized] === null) {
                return "";
            }
            const target = aliases[normalized] || normalized;
            const defaultMatch = defaultProducts.find((p) => normalizeProductName(p.name) === target);
            return defaultMatch ? defaultMatch.name : rawName;
        }

        function isDefaultProductName(name) {
            const normalized = normalizeProductName(name);
            return defaultProducts.some((p) => normalizeProductName(p.name) === normalized);
        }

        if (Array.isArray(storedProducts)) {
            storedProducts.forEach((item) => {
                if (!item || typeof item.name !== "string") return;
                const cleanName = canonicalProductName(item.name);
                const cleanPrice = Number(item.price);
                if (!cleanName || Number.isNaN(cleanPrice)) return;

                const normalizedName = normalizeProductName(cleanName);
                const existingIndex = products.findIndex((p) => normalizeProductName(p.name) === normalizedName);
                if (existingIndex >= 0) {
                    if (!isDefaultProductName(cleanName)) {
                        products[existingIndex].price = cleanPrice;
                    }
                } else {
                    products.push({ name: cleanName, price: cleanPrice, img: item.img });
                }
            });
        }

        products = products.filter((item, index, arr) => {
            const key = normalizeProductName(item.name);
            return index === arr.findIndex((p) => normalizeProductName(p.name) === key);
        });

        function render() {
            const list = document.getElementById("productList");
            list.innerHTML = "";
            products.forEach((p, index) => {
                const imgUrl = p.img ? p.img : `https://picsum.photos/seed/${encodeURIComponent(p.name)}/100/100`;
                const delay = (index * 0.04).toFixed(2);
                list.innerHTML += `
            <div class="product" style="animation-delay: ${delay}s">
                <img src="${imgUrl}" alt="${p.name}" class="product-img" onerror="this.src='https://picsum.photos/seed/food/100/100'">
                <span class="product-name">${p.name}</span>
                <span class="price">${p.price.toFixed(2)} €</span>
            </div>
        `;
            });
            localStorage.setItem("products", JSON.stringify(products));
        }

        function addProduct() {
            const name = document.getElementById("name").value;
            const price = parseFloat(document.getElementById("price").value);
            if (name && !Number.isNaN(price)) {
                const canonicalName = canonicalProductName(name);
                const normalizedName = normalizeProductName(canonicalName);
                const existingIndex = products.findIndex((p) => normalizeProductName(p.name) === normalizedName);
                if (existingIndex >= 0) {
                    products[existingIndex].price = price;
                } else {
                    products.push({ name: canonicalName, price });
                }
                render();
                document.getElementById("name").value = "";
                document.getElementById("price").value = "";
            }
        }

        function renderRandomBackground() {
            const bg = document.getElementById("bgIcons");
            const icons = ["🧁", "☕", "🍰", "🥟", "🍪", "🥐", "🍩"];
            const cellSize = 145;
            const cols = Math.ceil(window.innerWidth / cellSize) + 1;
            const rows = Math.ceil(window.innerHeight / cellSize) + 1;
            bg.innerHTML = "";

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const item = document.createElement("span");
                    const iconIndex = (row + col) % icons.length;
                    item.textContent = icons[iconIndex];
                    const offsetX = (row % 2) * (cellSize * 0.32);
                    const posX = (col * cellSize) + (cellSize / 2) - 18 + offsetX;
                    const posY = (row * cellSize) + (cellSize / 2) - 18;
                    const variation = ((row * 3 + col * 5) % 5);
                    const size = 30 + (variation * 2);
                    const opacity = 0.08 + (variation * 0.018);
                    const rotation = ((row * 11 + col * 7) % 26) - 13;

                    item.style.left = `${posX}px`;
                    item.style.top = `${posY}px`;
                    item.style.fontSize = `${size}px`;
                    item.style.opacity = `${opacity.toFixed(3)}`;
                    item.style.transform = `rotate(${rotation}deg)`;
                    bg.appendChild(item);
                }
            }
        }

        document.body.addEventListener("dblclick", () => {
            const panel = document.getElementById("adminPanel");
            panel.style.display = panel.style.display === "none" ? "block" : "none";
        });

        window.addEventListener("resize", renderRandomBackground);

        renderRandomBackground();
        render();
    </script>

</body>

</html>
